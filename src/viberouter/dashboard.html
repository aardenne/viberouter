<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeRouter — Live Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #111827;
            --bg-card: #1a2234;
            --border: #2a3550;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --accent-blue: #3b82f6;
            --accent-green: #22c55e;
            --accent-red: #ef4444;
            --accent-yellow: #eab308;
            --accent-purple: #a855f7;
            --accent-cyan: #06b6d4;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 24px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header h1::before {
            content: '⚡';
            -webkit-text-fill-color: initial;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: var(--bg-card);
            border-radius: 999px;
            border: 1px solid var(--border);
            font-size: 14px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--accent-green);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            transition: border-color 0.3s;
        }

        .card:hover {
            border-color: var(--accent-blue);
        }

        .card-label {
            font-size: 13px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }

        .card-value {
            font-size: 36px;
            font-weight: 700;
        }

        .card-sub {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .nodes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }

        .node-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
        }

        .node-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .node-name {
            font-size: 18px;
            font-weight: 600;
        }

        .node-status {
            padding: 4px 12px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
        }

        .node-status.healthy {
            background: rgba(34, 197, 94, 0.15);
            color: var(--accent-green);
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .node-status.unhealthy {
            background: rgba(239, 68, 68, 0.15);
            color: var(--accent-red);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .node-model {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 16px;
        }

        .load-bar-container {
            margin-bottom: 16px;
        }

        .load-bar-label {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin-bottom: 6px;
            color: var(--text-secondary);
        }

        .load-bar {
            height: 8px;
            background: var(--bg-primary);
            border-radius: 4px;
            overflow: hidden;
        }

        .load-bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s ease, background 0.3s;
        }

        .load-bar-fill.low { background: var(--accent-green); }
        .load-bar-fill.medium { background: var(--accent-yellow); }
        .load-bar-fill.high { background: var(--accent-red); }

        .stats-row {
            display: flex;
            gap: 16px;
        }

        .stat-item {
            flex: 1;
            text-align: center;
            padding: 12px;
            background: var(--bg-primary);
            border-radius: 12px;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 600;
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-top: 2px;
        }

        .chart-container {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .chart-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .bottom-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 900px) {
            .bottom-grid { grid-template-columns: 1fr; }
        }

        .log-container {
            background: var(--bg-primary);
            border-radius: 12px;
            padding: 16px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 12px;
            line-height: 1.8;
        }

        .log-entry {
            display: flex;
            gap: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            padding: 4px 0;
        }

        .log-time {
            color: var(--text-secondary);
            white-space: nowrap;
        }

        .log-type {
            font-weight: 600;
            min-width: 60px;
        }

        .log-type.info { color: var(--accent-blue); }
        .log-type.route { color: var(--accent-green); }
        .log-type.error { color: var(--accent-red); }
        .log-type.warn { color: var(--accent-yellow); }

        .config-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
        }

        .config-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 14px;
        }

        .config-key {
            color: var(--text-secondary);
        }

        .config-val {
            font-family: 'JetBrains Mono', monospace;
            color: var(--accent-cyan);
        }

        #ws-status {
            transition: all 0.3s;
        }

        .uptime-timer {
            font-family: 'JetBrains Mono', monospace;
            font-size: 16px;
            color: var(--accent-cyan);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>VibeRouter Control</h1>
        <div class="status-badge">
            <div class="status-dot" id="ws-status"></div>
            <span id="ws-text">Connecting...</span>
        </div>
    </div>

    <!-- Summary Cards -->
    <div class="grid">
        <div class="card">
            <div class="card-label">Healthy Nodes</div>
            <div class="card-value" id="healthy-count" style="color: var(--accent-green)">0/0</div>
            <div class="card-sub">Cluster status</div>
        </div>
        <div class="card">
            <div class="card-label">Strategy</div>
            <div class="card-value" id="strategy" style="font-size: 20px; color: var(--accent-blue)">—</div>
            <div class="card-sub">Routing algorithm</div>
        </div>
        <div class="card">
            <div class="card-label">Total Requests</div>
            <div class="card-value" id="total-requests" style="color: var(--accent-purple)">0</div>
            <div class="card-sub">Since startup</div>
        </div>
        <div class="card">
            <div class="card-label">Total Errors</div>
            <div class="card-value" id="total-errors" style="color: var(--accent-red)">0</div>
            <div class="card-sub">Error rate: <span id="error-rate">0%</span></div>
        </div>
    </div>

    <!-- Node Cards -->
    <div class="nodes-grid" id="nodes-grid"></div>

    <!-- Charts -->
    <div class="chart-container">
        <div class="chart-title">Requests Over Time</div>
        <canvas id="requests-chart" height="100"></canvas>
    </div>

    <!-- Bottom Grid -->
    <div class="bottom-grid">
        <div class="chart-container">
            <div class="chart-title">Load Distribution</div>
            <canvas id="load-chart" height="200"></canvas>
        </div>
        <div class="config-section">
            <div class="chart-title">System Config</div>
            <div class="config-row">
                <span class="config-key">Version</span>
                <span class="config-val">0.4.0</span>
            </div>
            <div class="config-row">
                <span class="config-key">Uptime</span>
                <span class="config-val uptime-timer" id="uptime">00:00:00</span>
            </div>
            <div class="config-row">
                <span class="config-key">WebSocket</span>
                <span class="config-val">Connected</span>
            </div>
            <div class="config-row">
                <span class="config-key">Last Update</span>
                <span class="config-val" id="last-update">—</span>
            </div>
        </div>
    </div>

    <!-- Activity Log -->
    <div class="chart-container" style="margin-top: 20px;">
        <div class="chart-title">Recent Activity</div>
        <div class="log-container" id="log-container"></div>
    </div>

    <script>
        // ---- State ----
        let ws = null;
        let wsReconnectDelay = 1000;
        let startTime = Date.now();
        let logEntries = [];
        let requestData = { labels: [], values: [] };
        let loadData = { labels: [], values: [] };

        // ---- Charts ----
        const requestsCtx = document.getElementById('requests-chart').getContext('2d');
        const requestsChart = new Chart(requestsCtx, {
            type: 'line',
            data: {
                labels: requestData.labels,
                datasets: [{
                    label: 'Requests',
                    data: requestData.values,
                    borderColor: '#3b82f6',
                    backgroundColor: 'rgba(59, 130, 246, 0.1)',
                    fill: true,
                    tension: 0.4,
                    pointRadius: 2,
                    borderWidth: 2,
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { display: false } },
                scales: {
                    x: { ticks: { color: '#94a3b8', maxTicksLimit: 8 }, grid: { color: 'rgba(255,255,255,0.05)' } },
                    y: { ticks: { color: '#94a3b8' }, grid: { color: 'rgba(255,255,255,0.05)' }, beginAtZero: true }
                },
                animation: { duration: 300 }
            }
        });

        const loadCtx = document.getElementById('load-chart').getContext('2d');
        const loadChart = new Chart(loadCtx, {
            type: 'bar',
            data: {
                labels: loadData.labels,
                datasets: [{
                    label: 'Current Load',
                    data: loadData.values,
                    backgroundColor: loadData.labels.map(() => '#22c55e'),
                    borderRadius: 6,
                    barThickness: 40,
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { display: false } },
                scales: {
                    x: { ticks: { color: '#94a3b8' }, grid: { display: false } },
                    y: { ticks: { color: '#94a3b8' }, grid: { color: 'rgba(255,255,255,0.05)' }, beginAtZero: true }
                },
                animation: { duration: 300 }
            }
        });

        // ---- WebSocket ----
        function connectWS() {
            const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${proto}//${location.host}/ws/metrics`);

            ws.onopen = () => {
                document.getElementById('ws-status').style.background = 'var(--accent-green)';
                document.getElementById('ws-text').textContent = 'Live';
                wsReconnectDelay = 1000;
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                updateDashboard(data);
            };

            ws.onclose = () => {
                document.getElementById('ws-status').style.background = 'var(--accent-red)';
                document.getElementById('ws-text').textContent = 'Reconnecting...';
                setTimeout(connectWS, wsReconnectDelay);
                wsReconnectDelay = Math.min(wsReconnectDelay * 2, 30000);
            };

            ws.onerror = () => ws.close();
        }

        // ---- Dashboard Updates ----
        function updateDashboard(data) {
            const now = new Date().toLocaleTimeString();
            document.getElementById('last-update').textContent = now;

            // Summary
            document.getElementById('healthy-count').textContent = `${data.healthy_count}/${data.total_nodes}`;
            document.getElementById('strategy').textContent = data.strategy.replace(/_/g, ' ');

            let totalReq = 0, totalErr = 0;
            Object.values(data.nodes).forEach(n => {
                totalReq += n.requests;
                totalErr += n.errors;
            });
            document.getElementById('total-requests').textContent = totalReq.toLocaleString();
            document.getElementById('total-errors').textContent = totalErr.toLocaleString();
            document.getElementById('error-rate').textContent = totalReq > 0 ? ((totalErr/totalReq)*100).toFixed(1) + '%' : '0%';

            // Node cards
            const nodesGrid = document.getElementById('nodes-grid');
            nodesGrid.innerHTML = '';
            const chartLabels = [];
            const chartValues = [];

            Object.entries(data.nodes).forEach(([name, info]) => {
                const loadPct = info.total_capacity > 0 ? Math.round((info.load / info.total_capacity) * 100) : 0;
                const loadClass = loadPct < 50 ? 'low' : loadPct < 80 ? 'medium' : 'high';
                const statusClass = info.healthy ? 'healthy' : 'unhealthy';
                const statusText = info.healthy ? '● Healthy' : '● Unhealthy';

                const card = document.createElement('div');
                card.className = 'node-card';
                card.innerHTML = `
                    <div class="node-header">
                        <span class="node-name">${name}</span>
                        <span class="node-status ${statusClass}">${statusText}</span>
                    </div>
                    <div class="node-model">${info.model}</div>
                    <div class="load-bar-container">
                        <div class="load-bar-label">
                            <span>Load</span>
                            <span>${info.load} / ${info.total_capacity} (${loadPct}%)</span>
                        </div>
                        <div class="load-bar">
                            <div class="load-bar-fill ${loadClass}" style="width: ${loadPct}%"></div>
                        </div>
                    </div>
                    <div class="stats-row">
                        <div class="stat-item">
                            <div class="stat-value" style="color: var(--accent-blue)">${info.requests}</div>
                            <div class="stat-label">Requests</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" style="color: var(--accent-purple)">${(info.tokens/1000).toFixed(1)}K</div>
                            <div class="stat-label">Tokens</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" style="color: ${info.errors > 0 ? 'var(--accent-red)' : 'var(--accent-green)'}">${info.errors}</div>
                            <div class="stat-label">Errors</div>
                        </div>
                    </div>
                `;
                nodesGrid.appendChild(card);

                chartLabels.push(name);
                chartValues.push(info.load);

                // Log entry
                addLogEntry('info', `${name}: ${info.healthy ? 'healthy' : 'unhealthy'}`);
            });

            // Update charts
            requestData.labels.push(now);
            requestData.values.push(totalReq);
            if (requestData.labels.length > 30) {
                requestData.labels.shift();
                requestData.values.shift();
            }
            requestsChart.data.labels = [...requestData.labels];
            requestsChart.data.datasets[0].data = [...requestData.values];
            requestsChart.update();

            loadChart.data.labels = chartLabels;
            loadChart.data.datasets[0].data = chartValues;
            loadChart.update();

            // Color load bars based on values
            loadChart.data.datasets[0].backgroundColor = loadData.labels.map(() => {
                // We'll compute this from chartValues
                return '#22c55e';
            });
            // Dynamically color bars
            const maxLoad = Math.max(...chartValues, 1);
            loadChart.data.datasets[0].backgroundColor = chartValues.map(v => {
                const pct = v / maxLoad;
                if (pct < 0.33) return '#22c55e';
                if (pct < 0.66) return '#eab308';
                return '#ef4444';
            });
            loadChart.update();
        }

        function addLogEntry(type, message) {
            const now = new Date().toLocaleTimeString();
            logEntries.unshift({ time: now, type, message });
            if (logEntries.length > 50) logEntries.pop();

            const container = document.getElementById('log-container');
            container.innerHTML = logEntries.map(e =>
                `<div class="log-entry">
                    <span class="log-time">${e.time}</span>
                    <span class="log-type ${e.type}">${e.type.toUpperCase()}</span>
                    <span>${e.message}</span>
                </div>`
            ).join('');
        }

        // Uptime timer
        setInterval(() => {
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const h = String(Math.floor(elapsed / 3600)).padStart(2, '0');
            const m = String(Math.floor((elapsed % 3600) / 60)).padStart(2, '0');
            const s = String(elapsed % 60).padStart(2, '0');
            document.getElementById('uptime').textContent = `${h}:${m}:${s}`;
        }, 1000);

        // Init
        connectWS();
        addLogEntry('info', 'Dashboard initialized');
    </script>
</body>
</html>
