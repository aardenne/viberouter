name: VibeStack CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-viberouter:
    name: Test VibeRouter (Python)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          cd viberouter
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          cd viberouter
          python -m pytest tests/ -v --tb=short

      - name: Check formatting
        run: |
          cd viberouter
          pip install ruff
          ruff check src/ tests/
          ruff format --check src/ tests/

  test-vibecommit:
    name: Test VibeCommit (TypeScript)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: vibecommit/package-lock.json

      - name: Install dependencies
        run: |
          cd vibecommit
          npm ci

      - name: Run tests
        run: |
          cd vibecommit
          npx jest --coverage

      - name: Type check
        run: |
          cd vibecommit
          npx tsc --noEmit

  build:
    name: Build packages
    needs: [test-viberouter, test-vibecommit]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Build VibeRouter
        run: |
          cd viberouter
          pip install build twine
          rm -rf dist/ build/
          python -m build
          twine check dist/*

      - name: Build VibeCommit
        run: |
          cd vibecommit
          npm ci
          npm run build
          npm pack --dry-run

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-packages
          path: |
            viberouter/dist/
            vibecommit/*.tgz

  publish-pypi:
    name: Publish to PyPI
    needs: [build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: pypi

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-packages
          path: dist/

      - name: Publish to PyPI
        env:
          PYPI_USERNAME: __token__
          PYPI_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          pip install twine
          twine upload --username __token__ --password "$PYPI_PASSWORD" viberouter/dist/*

  publish-npm:
    name: Publish to npm
    needs: [build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: npm

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-packages
          path: dist/

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd vibecommit
          npm publish --access public
